version: 2.1

jobs:
  test-cli:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -e ".[dev]"
          working_directory: cli
      - run:
          name: Run tests
          command: pytest --junitxml=test-results/results.xml
          working_directory: cli
      - run:
          name: Lint
          command: ruff check .
          working_directory: cli
      - store_test_results:
          path: cli/test-results
      - store_artifacts:
          path: cli/test-results
          destination: test-results

  whence-provenance:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Fetch full history and WHENCE notes
          command: |
            git fetch --unshallow || true
            git fetch origin refs/notes/whence:refs/notes/whence 2>/dev/null || true
      - run:
          name: Install git-whence
          command: pip install -e .
          working_directory: cli
      - run:
          name: Initialize WHENCE
          command: git whence init
      - run:
          name: Determine commit range
          command: |
            if [ -n "$CIRCLE_PULL_REQUEST" ]; then
              echo "export WHENCE_RANGE='origin/main..HEAD'" >> "$BASH_ENV"
            else
              echo "export WHENCE_RANGE='HEAD~1..HEAD'" >> "$BASH_ENV"
            fi
      - run:
          name: Verify trace integrity
          command: git whence verify $WHENCE_RANGE --policy integrity
      - run:
          name: Check co-author compliance
          command: git whence verify $WHENCE_RANGE --policy co-author
      - run:
          name: Generate provenance report
          command: |
            git whence report $WHENCE_RANGE --format markdown > whence-summary.md
            git whence report $WHENCE_RANGE --format json > whence-report.json
      - run:
          name: Post PR comment
          command: |
            if [ -n "$CIRCLE_PULL_REQUEST" ]; then
              gh pr comment --body-file whence-summary.md
            fi
      - store_artifacts:
          path: whence-report.json
          destination: whence-report.json
      - store_artifacts:
          path: whence-summary.md
          destination: whence-summary.md

workflows:
  build-and-verify:
    jobs:
      - test-cli
      - whence-provenance