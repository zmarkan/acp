name: WHENCE Provenance

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  whence-provenance:
    name: Verify AI Code Provenance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch WHENCE notes
        run: git fetch origin refs/notes/whence:refs/notes/whence 2>/dev/null || true

      - name: Install git-whence
        run: pip install -e .
        working-directory: cli

      - name: Initialize WHENCE
        run: git whence init

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "WHENCE_RANGE=origin/${{ github.event.pull_request.base.ref }}..HEAD" >> "$GITHUB_ENV"
          else
            echo "WHENCE_RANGE=HEAD~1..HEAD" >> "$GITHUB_ENV"
          fi

      - name: Verify trace integrity
        run: git whence verify $WHENCE_RANGE --policy integrity

      - name: Check co-author compliance
        run: git whence verify $WHENCE_RANGE --policy co-author

      - name: Generate provenance report
        run: |
          git whence report $WHENCE_RANGE --format markdown > whence-summary.md
          git whence report $WHENCE_RANGE --format json > whence-report.json

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file whence-summary.md

      - name: Upload provenance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whence-provenance
          path: |
            whence-report.json
            whence-summary.md
